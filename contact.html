<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="お問い合わせ — あしたの夜明け.com">
  <title>お問い合わせ | あしたの夜明け.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Yusei+Magic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="layout-inner header-inner">
      <p class="site-logo">
        <a href="index.html">あしたの夜明け.com</a>
      </p>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="メニューを開く">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>

      <nav class="site-nav" id="site-nav" aria-label="メインナビゲーション">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="instagram.html">Illustration</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="works.html">Works</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="content-inner page-main">
    <header class="page-header">
      <div class="page-deco">
        <img src="images/guide/contact.jpg" alt="" class="page-deco-image" width="160" height="160">
      </div>
      <h1 class="page-title">Contact</h1>
      <p class="page-lead">ご連絡・お仕事のご依頼はこちらから。</p>
    </header>

    <form class="contact-form" action="#" method="post">
      <p>
        <label for="name">お名前</label>
        <input type="text" id="name" name="name">
      </p>
      <p>
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email">
      </p>
      <p>
        <label for="message">メッセージ</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </p>
      <p>
        <button type="submit">送信</button>
      </p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="layout-inner footer-inner">
      <p class="footer-brand">あしたの夜明け.com</p>
      <p class="footer-copy">&copy; 2026 あしたの夜明け.com</p>
    </div>
  </footer>

  <button class="page-top-button" type="button" aria-label="ページトップへ戻る">↑ Top</button>

  <script src="script.js"></script>
</body>
</html>
