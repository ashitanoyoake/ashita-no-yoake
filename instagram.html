<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="イラスト作品一覧 — あしたの夜明け.com">
  <title>イラスト | あしたの夜明け.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Yusei+Magic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="layout-inner header-inner">
      <p class="site-logo">
        <a href="index.html">あしたの夜明け.com</a>
      </p>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="メニューを開く">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>

      <nav class="site-nav" id="site-nav" aria-label="メインナビゲーション">
        <ul class="nav-list">
          <li><a href="index.html">ホーム</a></li>
          <li><a href="instagram.html" aria-current="page">イラスト</a></li>
          <li><a href="blog.html">ブログ</a></li>
          <li><a href="works.html">実績紹介</a></li>
          <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="content-inner page-main">
    <header class="page-header">
      <div class="page-deco">
        <img src="images/guide/illustration.jpg" alt="" class="page-deco-image page-deco-image-sm" width="128" height="128">
      </div>
      <h1 class="page-title">イラスト</h1>
      <p class="page-lead">Instagramに投稿した作品を掲載するページです。</p>
    </header>

    <div class="instagram-gallery-wrap" data-instagram-gallery>
      <div class="instagram-gallery" aria-live="polite" hidden></div>
      <p class="instagram-gallery-message" hidden>現在投稿を読み込めません。</p>
    </div>

    <p class="section-link">
      <a href="https://www.instagram.com/ashitanoyoakedotcom/" target="_blank" rel="noopener noreferrer">Instagramアカウントを見る→</a>
    </p>
  </main>

  <footer class="site-footer">
    <div class="layout-inner footer-inner">
      <p class="footer-brand">あしたの夜明け.com</p>
      <p class="footer-copy">&copy; 2026 あしたの夜明け.com</p>
    </div>
  </footer>

  <div class="instagram-modal" role="dialog" aria-modal="true" aria-label="Instagram投稿の拡大表示" hidden>
    <div class="instagram-modal-inner">
      <button type="button" class="instagram-modal-close" aria-label="閉じる">×</button>
      <button type="button" class="instagram-modal-prev" aria-label="前の投稿">←</button>
      <button type="button" class="instagram-modal-next" aria-label="次の投稿">→</button>
      <figure class="instagram-modal-figure">
        <img class="instagram-modal-image" src="" alt="">
        <figcaption class="instagram-modal-caption">
          <a class="instagram-modal-link" href="#" target="_blank" rel="noopener noreferrer">Instagramの投稿を見る</a>
        </figcaption>
      </figure>
    </div>
  </div>

  <button class="page-top-button" type="button" aria-label="ページトップへ戻る">↑ Top</button>

  <script src="script.js"></script>
  <script src="js/instagram-gallery.js"></script>
</body>
</html>
